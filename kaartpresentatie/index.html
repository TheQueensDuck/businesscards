<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Business Card Grid - Met Glans</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle, rgba(84, 92, 97, 1) 0%, rgba(23, 41, 48, 1) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* GRID CONTAINER */
        .container {
            display: grid;
            grid-template-columns: repeat(2, auto);
            justify-content: center;
            gap: 30px;
        }

        /* GRID CEL */
        .grid-item {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 450px;
            height: 280px;
        }

        /* ALGEMENE BASIS KAART */
        .card3d {
            perspective: 800px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            height: 100%;
            max-width: 100%;
            /* Variabele voor de glans-positie */
            --sheen-x: 50%;
        }

        /* INNER 3D object */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.25s ease-out;
            will-change: transform;
        }

        /* BEIDE KANTEN */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.25s ease-out;
        }

        /* --- GLANS EFFECT --- */
        .card-face::after {
            content: '';
            position: absolute;
            inset: -100px;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(
                125deg, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.15) 45%, 
                rgba(255, 255, 255, 0.2) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            background-position: var(--sheen-x) 50%;
            background-size: 200% 200%;
            transition: background-position 0s; /* Directe reactie op muis */
        }

        /* Als de muis weg is, glans rustig terug naar het midden */
        .card3d:not(:hover) .card-face::after {
            transition: background-position 0.5s ease;
        }

        .card3d:hover .card-face {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .card-front { transform: rotateY(0deg); }
        .card-back { transform: rotateY(180deg); }

        .card-bg {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            z-index: 0;
        }

        .card-face img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .card1 { aspect-ratio: 85 / 55; }
        .card2 { aspect-ratio: 1 / 1; }
        .card3 { aspect-ratio: 85 / 55; }
        .card4 { aspect-ratio: 1 / 1; }

        .card1 .card-bg, .card2 .card-bg {
            background-image: url('assets/background1.png');
            background-size: cover;
            background-position: center;
        }

        .card3 .card-bg, .card4 .card-bg {
            background-image: url('assets/background2.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="grid-item">
            <div class="card3d card1">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="card-bg"></div>
                        <img src="./assets/front-1.svg" alt="Voorkant">
                    </div>
                    <div class="card-face card-back">
                        <div class="card-bg"></div>
                        <img src="./assets/back-1.svg" alt="Achterkant">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="card3d card2">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="card-bg"></div>
                        <img src="./assets/front-2.svg" alt="Voorkant">
                    </div>
                    <div class="card-face card-back">
                        <div class="card-bg"></div>
                        <img src="./assets/back-2.svg" alt="Achterkant">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="card3d card3">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="card-bg"></div>
                        <img src="./assets/front-1.svg" alt="Voorkant">
                    </div>
                    <div class="card-face card-back">
                        <div class="card-bg"></div>
                        <img src="./assets/back-1.svg" alt="Achterkant">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-item">
            <div class="card3d card4">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="card-bg"></div>
                        <img src="./assets/front-2.svg" alt="Voorkant">
                    </div>
                    <div class="card-face card-back">
                        <div class="card-bg"></div>
                        <img src="./assets/back-2.svg" alt="Achterkant">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function map(val, minA, maxA, minB, maxB) {
            return minB + ((val - minA) * (maxB - minB)) / (maxA - minA);
        }

        function updateCard(card, mouseX = null, mouseY = null) {
            const inner = card.querySelector('.card-inner');
            const rect = card.getBoundingClientRect();

            let rotateX = 0;
            let rotateY = 0;
            let sheenX = 50; // Standaard in het midden

            if (mouseX !== null && mouseY !== null) {
                rotateY = map(mouseX, 0, rect.width, -25, 25);
                rotateX = map(mouseY, 0, rect.height, 25, -25);
                
                // Bereken glans positie (0% tot 100%)
                sheenX = (mouseX / rect.width) * 100;
            }

            // Update de glans via een CSS variabele
            card.style.setProperty('--sheen-x', `${sheenX}%`);

            let flip = card.classList.contains('flipped') ? 180 : 0;
            inner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY + flip}deg)`;
        }

        document.querySelectorAll('.card3d').forEach(card => {
            card.addEventListener('mousemove', (ev) => {
                const rect = card.getBoundingClientRect();
                updateCard(card, ev.clientX - rect.left, ev.clientY - rect.top);
            });

            card.addEventListener('mouseleave', () => {
                // Reset posities
                updateCard(card);
                card.style.setProperty('--sheen-x', '50%');
            });

            card.addEventListener('click', () => {
                card.classList.toggle('flipped');
                const rect = card.getBoundingClientRect();
                // We geven de muispositie opnieuw mee om de flip direct correct te renderen
                // Als je geen muispositie hebt (bijv. mobiel), kun je hier null, null gebruiken
                updateCard(card);
            });
        });
    </script>

</body>
</html>
